<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Informasi Jadwal Kereta</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Informasi Keberangkatan Kereta Api</h1>
    <p>Sistem Pemesanan Tiket Jugijagijuk</p>

    <table>
        <thead>
            <tr>
                <th>No. KA</th>
                <th>Nama Kereta</th>
                <th>Jenis KA</th>
                <th>Stasiun Asal</th>
                <th>Waktu Berangkat</th>
                <th>Stasiun Tujuan</th>
                <th>Waktu Tiba</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="7">Sedang memuat data...</td>
            </tr>
        </tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://latangjpwljbyedpsidw.supabase.co', 
            'sb_publishable_KE2yCf39oIJMfjYUnYYVXA_0pZtMeJh'
        );

        async function ambilDataJadwal() {
            const { data, error } = await supabase
                .from('jadwal')
                .select(`
                    no_ka,
                    stasiun_keberangkatan,
                    waktu_keberangkatan,
                    stasiun_tujuan,
                    waktu_kedatangan,
                    kereta ( NamaKA, JenisKA )
                `);
            
            if (error) {
                console.error('Error:', error);
                document.querySelector('tbody').innerHTML = '<tr><td colspan="7">Gagal memuat data.</td></tr>';
                return;
            }

            const tbody = document.querySelector('tbody');
            tbody.innerHTML = '';
            
            data.forEach(jadwal => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${jadwal.no_ka}</td>
                    <td>${jadwal.kereta?.NamaKA || '-'}</td>
                    <td>${jadwal.kereta?.JenisKA || '-'}</td>
                    <td>${jadwal.stasiun_keberangkatan}</td>
                    <td>${jadwal.waktu_keberangkatan}</td>
                    <td>${jadwal.stasiun_tujuan}</td>
                    <td>${jadwal.waktu_kedatangan}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        ambilDataJadwal();
    </script>
</body>
</html>
