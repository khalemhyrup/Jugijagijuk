<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // 1. Masukkan URL dan Anon Key Supabase milikmu di sini
        const supabaseUrl = 'https://latangjpwljbyedpsidw.supabase.co/rest/v1/';
        const supabaseKey = 'sb_publishable_KE2yCf39oIJMfjYUnYYVXA_0pZtMeJh';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function ambilDataJadwal() {
            // 2. Tarik data dari tabel jadwal dan relasi ke tabel kereta
            const { data, error } = await supabase
                .from('jadwal')
                .select(`
                    no_ka,
                    stasiun_keberangkatan,
                    waktu_keberangkatan,
                    stasiun_tujuan,
                    waktu_kedatangan,
                    kereta ( NamaKA, JenisKA )
                `);
            
            if (error) {
                console.error('Gagal mengambil data:', error);
                return;
            }

            // 3. Render data ke dalam tabel HTML
            const tbody = document.querySelector('tbody');
            tbody.innerHTML = ''; // Kosongkan data dummy
            
            data.forEach(jadwal => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${jadwal.no_ka}</strong></td>
                    <td>${jadwal.kereta.NamaKA}</td>
                    <td><span class="badge-tipe">${jadwal.kereta.JenisKA}</span></td>
                    <td>${jadwal.stasiun_keberangkatan}</td>
                    <td>${jadwal.waktu_keberangkatan}</td>
                    <td>${jadwal.stasiun_tujuan}</td>
                    <td>${jadwal.waktu_kedatangan}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        // Jalankan fungsi saat halaman dimuat
        ambilDataJadwal();
    </script>
</body>
